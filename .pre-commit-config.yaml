# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: local
    hooks:
    -   id: check-verbose
        name: check VERBOSE = 1
        entry: python -m exdrf_util.check_verbose --fix
        language: system
        types: [python]
    -   id: remove-empty-file-named-file
        name: remove empty stray files named "file"
        entry: python -m exdrf_dev.remove_empty_file_named_file
        language: system
        files: (^|.*/)file$
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-docstring-first
    -   id: check-json
        exclude: launch\.json
    -   id: check-toml
    -   id: check-xml
    -   id: check-yaml
    -   id: debug-statements
    -   id: destroyed-symlinks
    -   id: check-illegal-windows-names
    -   id: check-vcs-permalinks
    -   id: mixed-line-ending
    -   id: check-merge-conflict
    -   id: name-tests-test
    -   id: check-added-large-files
    -   id: fix-byte-order-marker
    -   id: check-case-conflict
    -   id: end-of-file-fixer
    -   id: detect-private-key
-   repo: local
    hooks:
    -   id: ruff
        name: ruff
        entry: ruff check --select E,F,I --ignore E203,E501 --fix
        language: system
        types: [python]
    -   id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        types: [python]
