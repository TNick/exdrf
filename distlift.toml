# distlift configuration
#
# All keys are optional; defaults shown in comments. Uncomment and edit
# the ones you want to override.
#
# Precedence (highest first):
#   1. CLI flags
#   2. DISTLIFT_* environment variables
#   3. Local repo config (distlift.toml, .distlift.toml, [tool.distlift])
#   4. User config (this file, when in the user location)
#   5. System config (this file, when in the system location)
#   6. Built-in defaults
#


language = "python"                 # python | javascript
mode = "monorepo"                   # simple | monorepo
version_source = "tag"              # manifest | tag
remotes = ["origin", "advaita"]


[monorepo]

packages = [
    "exdrf",
    "exdrf-al",
    "exdrf-pd",
    "exdrf-ts",
    "exdrf-qt",
    "exdrf-dev",
    "exdrf-gen",
    "exdrf-gen-openapi2rtk",
    "exdrf-gen-al2qt",
    "exdrf-gen-al2pd",
    "exdrf-gen-al2rcv",
    "exdrf-gen-al2at",
    "exdrf-gen-al2xl",
    "exdrf-gen-pd2dare",
    "exdrf-gen-al2r",
    "exdrf-util",
    "exdrf-xl",
    "exdrf-rcv",
]
