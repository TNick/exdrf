name: Release

on:
  push:
    tags:
      - "v*-*"

jobs:
  build-and-publish:
    if: ${{ startsWith(github.ref_name, 'v') && contains(github.ref_name, '-') }}
    runs-on: docker
    container:
      image: docker.advaita.ro/gitlab-ci-2026:py312-node20

    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and publish Python package
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.PUB_PACKAGES }}
          TWINE_REPOSITORY_URL: https://git.advaita.ro/api/packages/advpy/pypi
        run: bash scripts/registry-release.sh

      - name: Upload release artifacts
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: exdrf-${{ github.ref_name }}
          retention-days: 14
          path: release_dist/*
