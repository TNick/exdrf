name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-test-publish-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages (editable, dev)
        run: make init-d

      - name: Lint
        run: make lint

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: make test

      - name: Build wheels and sdists
        run: make build-packages

      - name: Collect artifacts
        run: make collect-dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: release_dist/

      - name: Verify install from TestPyPI
        run: |
          VERSION="$(python scripts/built_version.py --root "${GITHUB_WORKSPACE}")"
          python scripts/verify_install.py --root "${GITHUB_WORKSPACE}" \
            --version "${VERSION}"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-test-publish-testpypi
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages (editable, dev)
        run: make init-d

      - name: Build wheels and sdists
        run: make build-packages

      - name: Collect artifacts
        run: make collect-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release_dist/
