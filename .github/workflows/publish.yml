name: Publish

on:
  push:
    tags:
      - "v*-*"
  workflow_dispatch:
    inputs:
      package_dir:
        description: Top-level package directory (e.g. exdrf-qt)
        required: true
        type: string
      version:
        description: >-
          X.Y.Z — must match [project].version in that package's pyproject.toml
        required: true
        type: string

jobs:
  build-test-publish-testpypi:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Release tag metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}-${{ inputs.package_dir }}" \
              >> "${GITHUB_OUTPUT}"
            echo "pep_ver=${{ inputs.version }}" >> "${GITHUB_OUTPUT}"
            echo "pkg_dir=${{ inputs.package_dir }}" >> "${GITHUB_OUTPUT}"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
            if [[ "${TAG}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
              echo "pep_ver=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
              echo "pkg_dir=${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
            else
              echo "Expected tag vX.Y.Z-pkg_dir, got: ${TAG}" >&2
              exit 1
            fi
          fi

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Assert tag matches pyproject version
        run: |
          python scripts/assert_release_version.py \
            --root "${GITHUB_WORKSPACE}" \
            --tag "${{ steps.meta.outputs.tag }}"

      - name: Build wheels and sdists
        run: |
          python scripts/build_packages.py --include "${{ steps.meta.outputs.pkg_dir }}"

      - name: Collect artifacts
        run: |
          python scripts/collect_dist.py --include "${{ steps.meta.outputs.pkg_dir }}"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: release_dist/
          skip-existing: true
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Verify install from TestPyPI
        run: |
          python scripts/verify_install.py --root "${GITHUB_WORKSPACE}" \
            --package-dir "${{ steps.meta.outputs.pkg_dir }}" \
            --version "${{ steps.meta.outputs.pep_ver }}" \
            --install-attempts 12 \
            --install-retry-delay-seconds 15

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-test-publish-testpypi

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Release tag metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}-${{ inputs.package_dir }}" \
              >> "${GITHUB_OUTPUT}"
            echo "pep_ver=${{ inputs.version }}" >> "${GITHUB_OUTPUT}"
            echo "pkg_dir=${{ inputs.package_dir }}" >> "${GITHUB_OUTPUT}"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
            if [[ "${TAG}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
              echo "pep_ver=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
              echo "pkg_dir=${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
            else
              echo "Expected tag vX.Y.Z-pkg_dir, got: ${TAG}" >&2
              exit 1
            fi
          fi

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Assert tag matches pyproject version
        run: |
          python scripts/assert_release_version.py \
            --root "${GITHUB_WORKSPACE}" \
            --tag "${{ steps.meta.outputs.tag }}"

      - name: Build wheels and sdists
        run: |
          python scripts/build_packages.py --include "${{ steps.meta.outputs.pkg_dir }}"

      - name: Collect artifacts
        run: |
          python scripts/collect_dist.py --include "${{ steps.meta.outputs.pkg_dir }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release_dist/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
