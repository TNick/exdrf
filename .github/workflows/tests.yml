name: Tests

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packages (editable, dev)
        run: make init-d

      - name: Check
        env:
          QT_QPA_PLATFORM: offscreen
        run: make check
